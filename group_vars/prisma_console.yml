---
# Non-secret defaults. Override per-host in host_vars/.
# Secrets (bind password, backup token, etc.) MUST come from Vault/Ansible-Vault.

# Prisma Console install
prisma_version: "34_01_126"                      # must match the operator-supplied tarball
prisma_tarball_name: "prisma_cloud_compute_edition_{{ prisma_version }}.tar.gz"
prisma_install_dir: "/opt/prisma-install"        # where the tarball is staged and extracted
prisma_extracted_dir: "{{ prisma_install_dir }}/prisma_cloud_compute_edition_{{ prisma_version }}"
prisma_data_folder: "/var/lib/twistlock"         # bind-mount for the Console's persistent data

# Network ports — Console UI/API and Defender inbound comms respectively.
prisma_https_port: 8083
prisma_comm_port: 8084

# Enable RHEL FIPS mode. Required by the hardening baseline; disabling it
# skips the fips_enable role and will fail validation in prisma_validate.
prisma_fips_enabled: true

# TLS (expected on control node under files/)
prisma_custom_cert: true
prisma_cert_src: "console.crt"
prisma_key_src: "console.key"
prisma_ca_chain_src: "ca-chain.crt"
prisma_pki_dir: "/etc/pki/prisma"
prisma_cert_path: "{{ prisma_pki_dir }}/console.crt"
prisma_cert_key_path: "{{ prisma_pki_dir }}/console.key"
prisma_cert_ca_path: "{{ prisma_pki_dir }}/ca-chain.crt"

# Storage — data disk device (confirm per host). prisma_storage builds a
# single-LV VG on this device and mounts it at {{ prisma_data_folder }}.
prisma_data_device: "/dev/sdb"
prisma_vg_name: "vg_twistlock"
prisma_lv_name: "lv_data"
prisma_fs_label: "twistlock"

# NTP sources (internal). Prisma requires time sync within 30s of Defenders.
ntp_servers:
  - ntp1.internal
  - ntp2.internal

# Firewall source CIDRs. operator_cidr is the admin/support network;
# defender_cidr is where deployed Defenders will call home from.
firewall_allow_operator_cidr: "10.0.0.0/8"
firewall_allow_defender_cidr: "10.0.0.0/8"

# Backup
prisma_backup_dir: "/var/backups/prisma"          # local spool before remote upload
prisma_backup_retention_days: 30                  # find -mtime + -delete threshold
prisma_backup_user: "prisma-backup"               # service account in Prisma Console
# Set these via Vault — do NOT commit real values:
# prisma_backup_token: !vault ...
# internal_backup_url: "https://artefacts.internal/prisma/"

# Monitoring
node_exporter_version: "1.8.2"                    # must match the operator-supplied tarball
node_exporter_port: 9100                          # firewalld-exposed; prom scraper reaches in
siem_server: "siem.internal"                      # rsyslog destination for Console logs
siem_port: 514                                    # UDP syslog by convention; change if TLS-enabled
