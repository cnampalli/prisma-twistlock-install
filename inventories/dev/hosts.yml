---
# Dev inventory. Two sites: primary (live) + secondary (DR target).
# These are structural host identifiers (short names). The external
# Ansible/AAP platform team owns the real connection mapping (IP / SSH /
# FQDN) in the Controller inventory; it is deliberately not pinned here.
# For a local CLI run the short names must resolve via your DNS search
# domain (the .internal FQDN lives in host_vars as prisma_console_fqdn).
#
# A host belongs to two orthogonal axes:
#   - role group: prisma_console / prisma_scanner / prisma_sandbox (under prisma_all)
#   - site group: primary / secondary  (see group_vars/{primary,secondary}.yml)
all:
  children:
    prisma_all:
      children:
        prisma_console:
        prisma_scanner:
        prisma_sandbox:
    primary:
      hosts:
        prisma-console-dev-primary:
        prisma-scanner-dev-primary:
        prisma-sandbox-dev-primary:
    secondary:
      hosts:
        prisma-console-dev-secondary:
        prisma-scanner-dev-secondary:
        prisma-sandbox-dev-secondary:
    prisma_console:
      hosts:
        prisma-console-dev-primary:
        prisma-console-dev-secondary:
    prisma_scanner:
      hosts:
        prisma-scanner-dev-primary:
        prisma-scanner-dev-secondary:
    prisma_sandbox:
      hosts:
        prisma-sandbox-dev-primary:
        prisma-sandbox-dev-secondary:
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
