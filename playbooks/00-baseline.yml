---
- name: Phases 2-3 — host baseline + FIPS (all Prisma hosts)
  hosts: prisma_all
  gather_facts: true
  become: true
  roles:
    - role: rhel_baseline
      tags: [baseline]
    - role: fips_enable
      tags: [fips]

- name: Phase 4 — data-disk storage (console only)
  hosts: prisma_console
  gather_facts: true
  become: true
  roles:
    - role: prisma_storage
      tags: [storage]
