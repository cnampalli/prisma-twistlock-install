---
# twistlock.cfg is now seeded from the shipped twistlock.cfg.orig (which
# prisma_stage extracted alongside the installer) and then has only our
# project-specific overrides overlaid via lineinfile. Re-authoring the whole
# cfg from a Jinja template caused a cascade of "missing field" install
# failures during PR #3 (DOCKER_TWISTLOCK_TAG missing -> short-name error;
# SELINUX_LABEL missing -> bad-label error; READ_ONLY_FS, DATA_RECOVERY_*,
# CLEAN_STALE_NAMESPACES etc. would have followed). The seed+overlay design
# is self-correcting against new fields in future Prisma versions.

- name: Stat the shipped twistlock.cfg
  ansible.builtin.stat:
    path: "{{ prisma_extracted_dir }}/twistlock.cfg"
  register: _shipped_cfg

- name: Assert prisma_stage has extracted a shipped twistlock.cfg
  ansible.builtin.assert:
    that: _shipped_cfg.stat.exists
    fail_msg: >-
      No twistlock.cfg found in {{ prisma_extracted_dir }} — did prisma_stage
      run successfully? The shipped cfg ships inside the installer tarball
      and is required as the overlay source.

- name: Preserve the original shipped cfg (first run only — source of truth for overlay)
  ansible.builtin.copy:
    src: "{{ prisma_extracted_dir }}/twistlock.cfg"
    dest: "{{ prisma_extracted_dir }}/twistlock.cfg.orig"
    remote_src: true
    force: false
    owner: root
    group: root
    mode: "0600"

- name: Re-seed twistlock.cfg from the preserved original
  ansible.builtin.copy:
    src: "{{ prisma_extracted_dir }}/twistlock.cfg.orig"
    dest: "{{ prisma_extracted_dir }}/twistlock.cfg"
    remote_src: true
    force: true
    owner: root
    group: root
    mode: "0600"
    backup: true
  register: _reseed_cfg

- name: Overlay project-specific overrides onto twistlock.cfg
  ansible.builtin.lineinfile:
    path: "{{ prisma_extracted_dir }}/twistlock.cfg"
    regexp: "^{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
    state: present
    owner: root
    group: root
    mode: "0600"
  loop: "{{ prisma_config_overrides | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
