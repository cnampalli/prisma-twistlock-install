---
# The platform/DC team provisions and mounts the Console data volume at
# {{ prisma_data_folder }} before handover. This role does NOT create the
# VG/LV/filesystem/mount — it only verifies the mount is present and applies
# the SELinux container label that rootful podman bind-mounts require.

- name: Check whether the data folder is a mountpoint
  ansible.builtin.command: "findmnt -n -o FSTYPE,OPTIONS,SOURCE {{ prisma_data_folder }}"
  register: data_mount
  changed_when: false
  failed_when: false

- name: Assert the data folder is a dedicated XFS mount, not NFS
  ansible.builtin.assert:
    that:
      - data_mount.rc == 0
      - "'xfs' in data_mount.stdout"
      - "'nfs' not in data_mount.stdout"
    fail_msg: >-
      {{ prisma_data_folder }} must be a dedicated XFS mount provisioned by the
      platform/DC team before handover (findmnt rc={{ data_mount.rc }},
      output: '{{ data_mount.stdout }}'). Ask them to attach, format XFS, and
      mount the Console data volume at {{ prisma_data_folder }}.
    success_msg: "{{ prisma_data_folder }} is mounted XFS: {{ data_mount.stdout }}"

# SELinux labelling uses the semanage CLI directly rather than
# community.general.sefcontext: the target air-gapped EE does not ship the
# community.general collection and operators cannot add it. semanage is provided
# by policycoreutils-python-utils, installed by rhel_baseline. `-a` errors if the
# rule already exists, so we tolerate "already defined" for idempotency.
- name: Ensure SELinux fcontext for the data folder (semanage; no collection needed)
  ansible.builtin.command:
    cmd: "semanage fcontext -a -t container_file_t '{{ prisma_data_folder }}(/.*)?'"
  register: prisma_sefcontext
  changed_when: prisma_sefcontext.rc == 0
  failed_when:
    - prisma_sefcontext.rc != 0
    - "'already defined' not in (prisma_sefcontext.stderr | default(''))"

- name: Apply SELinux labels
  ansible.builtin.command: "restorecon -R {{ prisma_data_folder }}"
  changed_when: false
