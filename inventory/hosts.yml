---
# Inventory template. Populate host entries at runtime (e.g. via Vault lookup).
all:
  children:
    prisma_console:
      hosts:
        prisma-console-01:
          ansible_host: 10.0.0.0         # replace
          ansible_user: ansible           # or root via become
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
