---
# Credential INSTANCES. Secret values are intentionally omitted — populate them
# at apply time (-e @controller-secrets.vault.yml) or in the Controller UI after
# creation. Committing empty secret fields is safe.
controller_credentials:
  - name: "prisma-ssh"
    organization: "Security Platform"
    credential_type: "Machine"
    inputs:
      username: ansible
      # ssh_key_data: supplied at apply time (secret)

  - name: "prisma-backup-prod"
    organization: "Security Platform"
    credential_type: "Prisma Backup"
    inputs:
      internal_backup_url: "https://artefacts.internal/prisma/"   # REPLACE-ME (non-secret)
      # prisma_backup_token: supplied at apply time (secret)

  - name: "prisma-restore-api-prod"
    organization: "Security Platform"
    credential_type: "Prisma Restore API"
    inputs:
      prisma_restore_api_user: "dr-restore"                       # REPLACE-ME
      # prisma_restore_api_password: supplied at apply time (secret)
