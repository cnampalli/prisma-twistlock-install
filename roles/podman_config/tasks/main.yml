---
- name: Assert podman installed
  ansible.builtin.command: podman --version
  register: podman_ver
  changed_when: false

- name: Ensure /etc/containers exists
  ansible.builtin.file:
    path: /etc/containers
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Back up shipped registries.conf (first run only)
  ansible.builtin.copy:
    src: /etc/containers/registries.conf
    dest: /etc/containers/registries.conf.orig
    remote_src: true
    force: false
  ignore_errors: true

- name: Render registries.conf
  ansible.builtin.template:
    src: registries.conf.j2
    dest: /etc/containers/registries.conf
    owner: root
    group: root
    mode: "0644"

- name: Ensure certs.d dir for internal registry
  ansible.builtin.file:
    path: "/etc/containers/certs.d/{{ podman_internal_registry }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: podman_registry_ca_cert | length > 0

- name: Install CA cert for internal registry
  ansible.builtin.copy:
    src: "{{ podman_registry_ca_cert }}"
    dest: "/etc/containers/certs.d/{{ podman_internal_registry }}/ca.crt"
    owner: root
    group: root
    mode: "0644"
  when: podman_registry_ca_cert | length > 0

- name: Back up shipped storage.conf (first run only)
  ansible.builtin.copy:
    src: /etc/containers/storage.conf
    dest: /etc/containers/storage.conf.orig
    remote_src: true
    force: false
  ignore_errors: true

- name: Render storage.conf
  ansible.builtin.template:
    src: storage.conf.j2
    dest: /etc/containers/storage.conf
    owner: root
    group: root
    mode: "0644"

- name: Back up shipped containers.conf (first run only)
  ansible.builtin.copy:
    src: /etc/containers/containers.conf
    dest: /etc/containers/containers.conf.orig
    remote_src: true
    force: false
  ignore_errors: true

- name: Render containers.conf
  ansible.builtin.template:
    src: containers.conf.j2
    dest: /etc/containers/containers.conf
    owner: root
    group: root
    mode: "0644"

- name: Mask podman API socket (not required by Console)
  ansible.builtin.systemd:
    name: podman.socket
    enabled: false
    masked: true
    state: stopped
  ignore_errors: true

- name: Smoke test podman config
  ansible.builtin.command: podman info
  register: podman_info
  changed_when: false

- name: Assert podman runtime properties
  ansible.builtin.assert:
    that:
      - "'overlay' in podman_info.stdout"
      - "'seccomp' in podman_info.stdout"
      - "'selinux' in podman_info.stdout"
    fail_msg: "podman info did not report expected config — check /etc/containers/*.conf"
