---
# One job template per playbook/phase. Environment is chosen at launch
# (ask_inventory_on_launch); site scoping uses the Limit field
# (ask_limit_on_launch) with the inventory groups 'primary' / 'secondary'.
# The EE is referenced by name and assumed to exist (REPLACE-ME).
#
# Backup + restore secrets are supplied via surveys (survey_ops_backup.yml,
# survey_dr_drill.yml), NOT custom credential types — so no Controller
# superuser is needed. The only attached credential is the built-in Machine
# credential (prisma-ssh).
controller_templates:
  - name: "prisma-00-baseline (Phases 2-4)"
    project: "prisma-twistlock-install"
    playbook: "playbooks/00-baseline.yml"
    execution_environment: "prisma-airgap-ee"
    become_enabled: true
    ask_inventory_on_launch: true
    ask_limit_on_launch: true
    credentials:
      - "prisma-ssh"

  - name: "prisma-10-podman (Phase 5)"
    project: "prisma-twistlock-install"
    playbook: "playbooks/10-podman.yml"
    execution_environment: "prisma-airgap-ee"
    become_enabled: true
    ask_inventory_on_launch: true
    ask_limit_on_launch: true
    credentials:
      - "prisma-ssh"

  - name: "prisma-11-docker (Phase 3b)"
    project: "prisma-twistlock-install"
    playbook: "playbooks/11-docker.yml"
    execution_environment: "prisma-airgap-ee"
    become_enabled: true
    ask_inventory_on_launch: true
    ask_limit_on_launch: true
    credentials:
      - "prisma-ssh"

  - name: "prisma-site (Phases 2-8)"
    project: "prisma-twistlock-install"
    playbook: "playbooks/site.yml"
    execution_environment: "prisma-airgap-ee"
    become_enabled: true
    ask_inventory_on_launch: true
    ask_limit_on_launch: true
    credentials:
      - "prisma-ssh"
    # TLS cert/key/CA supplied as inline PEM (prisma_tls content source) AND
    # Nexus URL/creds for the installer tarball (prisma_stage nexus source),
    # because the EE has no control-node files/ dir. The two surveys are
    # concatenated in survey_stage_site.yml since Controller allows only one
    # survey_spec per template. See survey_stage_tls.yml + survey_stage_nexus.yml.
    survey_enabled: true
    survey_spec: "{{ survey_stage_site }}"

  - name: "prisma-30-ops (Phase 10)"
    project: "prisma-twistlock-install"
    playbook: "playbooks/30-prisma-ops.yml"
    execution_environment: "prisma-airgap-ee"
    become_enabled: true
    ask_inventory_on_launch: true
    ask_limit_on_launch: true
    credentials:
      - "prisma-ssh"
    survey_enabled: true
    survey_spec: "{{ survey_ops_backup }}"

  - name: "prisma-40-dr-drill"
    project: "prisma-twistlock-install"
    playbook: "playbooks/40-dr-drill.yml"
    execution_environment: "prisma-airgap-ee"
    become_enabled: true
    ask_inventory_on_launch: true
    ask_limit_on_launch: true
    credentials:
      - "prisma-ssh"
    survey_enabled: true
    survey_spec: "{{ survey_dr_drill }}"
