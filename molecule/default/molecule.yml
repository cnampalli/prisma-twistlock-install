---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: prisma-console-lab
    box: generic/rhel8
    memory: 16384
    cpus: 8
    provider_raw_config_args:
      - "customize ['modifyvm', :id, '--nictype1', 'virtio']"

provisioner:
  name: ansible
  playbooks:
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml
  inventory:
    hosts:
      prisma_console:
        hosts:
          prisma-console-lab:
    group_vars:
      prisma_console:
        # Console ports + host-class container package — normally
        # inherited from group_vars/prisma_console.yml at the project
        # root. Molecule runs from the scenario dir, so we inline them.
        prisma_https_port: 8083
        prisma_comm_port: 8084
        rhel_baseline_container_packages:
          - podman
        rhel_baseline_firewall_ports:
          - "8083/tcp"
          - "8084/tcp"
        # Data mount point. prepare.yml provisions+mounts it here (standing in
        # for the DC team); the verify-only prisma_storage role asserts it.
        prisma_data_folder: /var/lib/twistlock
        # Public NTP in the lab VM where internal NTP is unreachable.
        ntp_servers:
          - pool.ntp.org
        # Lab-only: the sandbox VM has no operator / Defender network, so
        # firewalld is opened to 0.0.0.0/0. PRODUCTION must NOT use this —
        # the real values (operator CIDR, Defender CIDR) live in
        # group_vars/prisma_console.yml and default to 10.0.0.0/8.
        firewall_allow_operator_cidr: 0.0.0.0/0
        firewall_allow_defender_cidr: 0.0.0.0/0

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - create
    - prepare
    - converge
    - verify
    - destroy
