---
# Non-secret defaults for the Prisma Console host class. Override per-host in host_vars/.
# Secrets (backup token/URL, restore API creds) are injected at job launch by AAP
# Controller credentials — never committed here. See controller/README.md.

# Prisma Console install
prisma_version: "34_01_126"                      # must match the operator-supplied tarball
prisma_tarball_name: "prisma_cloud_compute_edition_{{ prisma_version }}.tar.gz"
prisma_install_dir: "/opt/prisma-install"        # where the tarball is staged and extracted
# Palo Alto's tarball extracts flat into install_dir (twistlock.sh, twistlock.cfg*,
# linux/twistcli all land directly in /opt/prisma-install). Override per host
# if a future Prisma version ships with a wrapper subdirectory.
prisma_extracted_dir: "{{ prisma_install_dir }}"
prisma_data_folder: "/var/lib/twistlock"         # bind-mount for the Console's persistent data
# Tarball source — setting prisma_stage_nexus_path switches prisma_stage from
# files/ (control-node) to nexus (downloaded via get_url, EE-relay).
# Combines with {{ nexus_base_url }} (group_vars/all.yml) to form the full
# download URL. Credentials come from the shared AAP "Nexus" credential or
# survey_stage_nexus; for local CLI runs pass them via -e @local-secrets.yml.
prisma_stage_nexus_path: "/repository/prisma-packages/twistlock"

# Network ports — Console UI/API and Defender inbound comms respectively.
prisma_https_port: 8083
prisma_comm_port: 8084

# Console host-class overrides for rhel_baseline. Other host classes
# (scanner, sandbox) use the role defaults (no podman, no inbound ports).
rhel_baseline_container_packages:
  - podman
rhel_baseline_firewall_ports:
  - "{{ prisma_https_port }}/tcp"
  - "{{ prisma_comm_port }}/tcp"

# Enable RHEL FIPS mode. Required by the hardening baseline; disabling it
# skips the fips_enable role and will fail validation in prisma_validate.
prisma_fips_enabled: true

# TLS (expected on control node under files/)
prisma_custom_cert: true
prisma_cert_src: "console.crt"
prisma_key_src: "console.key"
prisma_ca_chain_src: "ca-chain.crt"
prisma_pki_dir: "/etc/pki/prisma"
prisma_cert_path: "{{ prisma_pki_dir }}/console.crt"
prisma_cert_key_path: "{{ prisma_pki_dir }}/console.key"
prisma_cert_ca_path: "{{ prisma_pki_dir }}/ca-chain.crt"

# Storage — the platform/DC team provisions and mounts the Console data
# volume at {{ prisma_data_folder }} (XFS, not NFS) before handover.
# prisma_storage only verifies the mount and applies the SELinux container
# label; it no longer creates the VG/LV/filesystem/mount.

# Firewall source CIDRs. operator_cidr is the admin/support network;
# defender_cidr is where deployed Defenders call home from. Override per
# site in {primary,secondary}.yml if the two sites use different ranges.
firewall_allow_operator_cidr: "10.0.0.0/8"
firewall_allow_defender_cidr: "10.0.0.0/8"

# Backup. prisma_backup_dir is an NFS mount shared primary<->secondary:
# primary writes, secondary reads it during the DR drill.
prisma_backup_dir: "/var/lib/twistlock-backup"
prisma_backup_retention_days: 30                  # find -mtime + -delete threshold
prisma_backup_user: "prisma-backup"               # service account in Prisma Console
# prisma_backup_token + internal_backup_url are injected at launch by the
# "Prisma Backup" Controller credential (controller/group_vars/all/credential_types.yml).

# Monitoring
node_exporter_version: "1.8.2"                    # must match the operator-supplied tarball
node_exporter_port: 9100                          # firewalld-exposed; prom scraper reaches in
siem_server: "siem.internal"                      # rsyslog destination for Console logs
siem_port: 514                                    # UDP syslog by convention; change if TLS-enabled
