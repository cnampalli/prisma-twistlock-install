---
- name: Ensure PKI dir
  ansible.builtin.file:
    path: "{{ prisma_pki_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Stage TLS materials
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { src: "{{ prisma_cert_src }}", dest: "{{ prisma_cert_path }}", mode: "0600" }
    - { src: "{{ prisma_key_src }}", dest: "{{ prisma_cert_key_path }}", mode: "0600" }
    - { src: "{{ prisma_ca_chain_src }}", dest: "{{ prisma_cert_ca_path }}", mode: "0644" }
  no_log: true

- name: Restore SELinux context on PKI dir
  ansible.builtin.command: "restorecon -R {{ prisma_pki_dir }}"
  changed_when: false

- name: Inspect certificate
  community.crypto.x509_certificate_info:
    path: "{{ prisma_cert_path }}"
  register: cert_info

- name: Inspect private key
  community.crypto.openssl_privatekey_info:
    path: "{{ prisma_cert_key_path }}"
  register: key_info
  no_log: true

- name: Assert cert and key match
  ansible.builtin.assert:
    that: cert_info.public_key == key_info.public_key
    fail_msg: "TLS cert and key public keys do not match"

- name: Verify cert chains to supplied CA
  ansible.builtin.command: "openssl verify -CAfile {{ prisma_cert_ca_path }} {{ prisma_cert_path }}"
  register: cert_verify
  changed_when: false
  failed_when: "'OK' not in cert_verify.stdout"
