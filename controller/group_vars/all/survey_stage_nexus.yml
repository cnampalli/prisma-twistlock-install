---
# Survey for the prisma-site job template: supplies the Nexus base URL +
# (optional) basic-auth credentials used by every role that fetches from
# Nexus (prisma_stage, docker_stage, future). ONE Nexus server, ONE
# credential — the per-role repo path lives in group_vars
# (prisma_stage_nexus_path on prisma_console.yml, docker_stage_nexus_path on
# prisma_scanner.yml). For local CLI runs the equivalent is
# `-e nexus_base_url=… -e @local-secrets.yml`.
#
# NOTE: the survey `password` field IS masked (single-line, hidden in job
# output) — unlike survey_stage_tls's textarea key, which is the trade-off
# documented over there. The Path A alternative is the `Nexus` credential
# type in controller_credential_types.yml (needs superuser).
survey_stage_nexus:
  name: "Nexus artifact source"
  description: >-
    Internal Nexus repo URL + credentials used by every role that fetches
    artifacts (prisma_stage, docker_stage).
  spec:
    - question_name: "Nexus base URL"
      question_description: >-
        Scheme + host (no trailing slash), e.g. https://nexus.com.au. Each
        role appends its own repo path (prisma_stage_nexus_path,
        docker_stage_nexus_path) onto this.
      variable: nexus_base_url
      type: text
      required: true
      default: "https://nexus.com.au"
    - question_name: "Nexus username (optional)"
      question_description: "Leave blank for anonymous-read repos."
      variable: nexus_username
      type: text
      required: false
      default: ""
    - question_name: "Nexus password (optional)"
      question_description: >-
        Basic-auth password. Masked at launch and never echoed in task output
        (every role's get_url tasks set no_log).
      variable: nexus_password
      type: password
      required: false
      default: ""
