---
argument_specs:
  main:
    short_description: "Verify the Console data volume is mounted and apply its SELinux container label."
    options:
      prisma_data_folder:
        type: str
        description: >-
          Mount point the platform/DC team provisions for the Console's
          persistent data. The role asserts it is a dedicated XFS mount
          (not NFS) and labels it container_file_t; it does not create it.
