---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: docker

# Rationale: the default scenario uses the vagrant driver to exercise
# FIPS-boot + real LVM and cannot run on GitHub Actions. This `full`
# scenario runs under docker so CI exercises the extra role surface that
# default skips — prisma_tls (community.crypto modules, cert/key match
# assertion) and the syntax/templating of prisma_stage / prisma_config.
# Destructive kernel-level operations (FIPS boot, storage) are disabled
# via variable overrides; integrity checks are exercised with the mock
# artefacts that prepare.yml fabricates in-container.
platforms:
  - name: prisma-console-full
    image: registry.access.redhat.com/ubi9/ubi-init:9.4
    pre_build_image: true
    privileged: true
    command: /sbin/init
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    capabilities:
      - SYS_ADMIN
    groups:
      - prisma_console

provisioner:
  name: ansible
  config_options:
    defaults:
      # ubi-init containers expose an unwritable HOME over the docker
      # connection, so Ansible's default ~/.ansible/tmp can't be created.
      # Root the remote tmp under /tmp (per Ansible's own suggestion).
      remote_tmp: /tmp/.ansible-tmp
  playbooks:
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml
  inventory:
    group_vars:
      prisma_console:
        # Kernel/boot-dependent roles cannot run inside a container.
        prisma_fips_enabled: false
        # TLS + integrity knobs that the fabricated artefacts satisfy.
        prisma_custom_cert: true
        prisma_version: "34_01_126"
        # node_exporter_sha256 is injected from prepare.yml via set_fact
        # so the digest matches whatever tarball that play actually builds.

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - create
    - prepare
    - converge
    - verify
    - destroy
