---
# Preproduction — env-wide non-secret defaults. Applies to every Prisma host
# (console, scanner, sandbox) in this environment unless overridden by a more
# specific group_vars or host_vars file.
#
# Precedence (lowest -> highest):
#   1. role defaults/main.yml
#   2. inventories/preproduction/group_vars/all.yml                  (this file)
#   3. inventories/preproduction/group_vars/prisma_all.yml
#   4. inventories/preproduction/group_vars/prisma_{console,scanner,sandbox}.yml
#   5. inventories/preproduction/group_vars/{primary,secondary}.yml  (ansible_group_priority: 10)
#   6. inventories/preproduction/host_vars/<host>.yml
#
# Secrets are injected at job launch by AAP Controller credentials — never
# committed here. For local CLI runs, pass `-e @local-secrets.yml` (gitignored).

# Auto-discover the Python interpreter when launched from an AAP execution
# environment (RHEL 9 base). The RHEL 8 control-node CLI default
# (/usr/libexec/platform-python) stays pinned in ansible.cfg.
ansible_python_interpreter: auto_silent

# Admin password-auth exception (loosens the hardened baseline). Admins reach
# these hosts via MobaXterm with AD username/password; password SSH is otherwise
# disabled by rhel_baseline. Scoped to the admin source network below — TIGHTEN
# this list to your real jump/admin subnet(s). Set the exception false for
# key/Kerberos-only hosts. The Match Address line joins these CIDRs with ','
# natively — list every legitimate source network (admin LAN, jump host,
# AAP EE outbound subnet) or operators will hit troubleshooting.md #4 again
# after the FIPS reboot from any unlisted IP.
rhel_baseline_password_auth_exception: true
rhel_baseline_password_auth_cidrs:
  - "10.0.0.0/8"

# Internal Nexus artifact repository. ONE Nexus server, ONE credential —
# each role appends its own repo path (prisma_stage_nexus_path,
# docker_stage_nexus_path, etc.) onto nexus_base_url. nexus_username /
# nexus_password are injected at job launch by the "Nexus" AAP credential
# (controller/group_vars/all/controller_credential_types.yml) or the
# survey_stage_nexus password field; for local CLI runs pass them via
# -e @local-secrets.yml.
nexus_base_url: "https://nexus.com.au"
nexus_validate_certs: true
