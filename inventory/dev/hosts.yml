---
# Dev environment inventory. Two data centres, three VM roles per DC.
# Replace the placeholder ansible_host IPs before a real run.
all:
  children:
    prisma_all:
      children:
        prisma_console:
        prisma_scanner:
        prisma_sandbox:
    dev:
      children:
        dc1:
        dc2:
    dc1:
      hosts:
        prisma-console-dev-dc1:
          ansible_host: 10.10.1.10
        prisma-scanner-dev-dc1:
          ansible_host: 10.10.1.11
        prisma-sandbox-dev-dc1:
          ansible_host: 10.10.1.12
    dc2:
      hosts:
        prisma-console-dev-dc2:
          ansible_host: 10.10.2.10
        prisma-scanner-dev-dc2:
          ansible_host: 10.10.2.11
        prisma-sandbox-dev-dc2:
          ansible_host: 10.10.2.12
    prisma_console:
      hosts:
        prisma-console-dev-dc1:
        prisma-console-dev-dc2:
    prisma_scanner:
      hosts:
        prisma-scanner-dev-dc1:
        prisma-scanner-dev-dc2:
    prisma_sandbox:
      hosts:
        prisma-sandbox-dev-dc1:
        prisma-sandbox-dev-dc2:
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
