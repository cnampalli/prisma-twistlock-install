---
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: yamllint + ansible-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # No pip cache: deps are installed inline below, and setup-python's
          # cache:pip errors when there's no requirements.txt/pyproject.toml.

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ansible-core>=2.16" "ansible-lint>=24" "yamllint>=1.35"
          ansible-galaxy collection install -r requirements.yml

      - name: yamllint
        run: yamllint .

      - name: ansible-lint
        run: ansible-lint

      - name: ansible syntax-check
        run: ansible-playbook --syntax-check playbooks/site.yml

  molecule:
    name: molecule full
    runs-on: ubuntu-latest
    needs: lint
    # NON-BLOCKING: kept for visibility only. The full/ubi-init scenario has
    # unresolved container issues under GitHub Actions, and this repo's real CI
    # is CloudBees (not GH Actions). lint is the gating check. Validate role
    # convergence by running the playbooks directly against servers, or via
    # molecule locally. TODO: fix the ubi-init scenario or port molecule to a
    # CloudBees stage.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # No pip cache: deps are installed inline below, and setup-python's
          # cache:pip errors when there's no requirements.txt/pyproject.toml.

      - name: Install molecule + deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ansible-core>=2.16" "molecule>=6" "molecule-plugins[docker]>=23" "docker>=7"
          ansible-galaxy collection install -r requirements.yml

      - name: molecule test
        run: molecule test -s full
        env:
          ANSIBLE_FORCE_COLOR: "1"
          PY_COLORS: "1"
