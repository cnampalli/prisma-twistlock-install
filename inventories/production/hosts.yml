---
# Production inventory. Two sites: primary (live) + secondary (DR target).
# Three VM roles per site. Replace placeholder ansible_host IPs before a real run.
#
# A host belongs to two orthogonal axes:
#   - role group: prisma_console / prisma_scanner / prisma_sandbox (under prisma_all)
#   - site group: primary / secondary  (see group_vars/{primary,secondary}.yml)
all:
  children:
    prisma_all:
      children:
        prisma_console:
        prisma_scanner:
        prisma_sandbox:
    primary:
      hosts:
        prisma-console-prod-primary:
          ansible_host: 10.40.1.10
        prisma-scanner-prod-primary:
          ansible_host: 10.40.1.11
        prisma-sandbox-prod-primary:
          ansible_host: 10.40.1.12
    secondary:
      hosts:
        prisma-console-prod-secondary:
          ansible_host: 10.40.2.10
        prisma-scanner-prod-secondary:
          ansible_host: 10.40.2.11
        prisma-sandbox-prod-secondary:
          ansible_host: 10.40.2.12
    prisma_console:
      hosts:
        prisma-console-prod-primary:
        prisma-console-prod-secondary:
    prisma_scanner:
      hosts:
        prisma-scanner-prod-primary:
        prisma-scanner-prod-secondary:
    prisma_sandbox:
      hosts:
        prisma-sandbox-prod-primary:
        prisma-sandbox-prod-secondary:
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
