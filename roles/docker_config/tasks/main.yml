---
- name: Ensure /etc/docker exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render daemon.json
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart docker

- name: Ensure docker systemd override dir
  ansible.builtin.file:
    path: /etc/systemd/system/docker.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render docker systemd override
  ansible.builtin.template:
    src: override.conf.j2
    dest: /etc/systemd/system/docker.service.d/override.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart docker

- name: Enable and start docker
  ansible.builtin.systemd:
    name: docker.service
    enabled: true
    state: started
    daemon_reload: true

# Force the queued `Restart docker` handler (notified by the daemon.json /
# override.conf renders above) to fire BEFORE the smoke test. Without this
# the handler waits until end-of-play and `docker info` queries the stale
# running daemon — which on a fresh host was started by dnf post-install
# with package defaults (cgroupfs cgroup driver), so the assert fails on
# the `'systemd' in docker_info.stdout` substring even though daemon.json
# correctly sets native.cgroupdriver=systemd. See troubleshooting.md #10.
- name: Flush handlers so docker picks up the new daemon.json before we smoke-test it
  ansible.builtin.meta: flush_handlers

- name: Smoke test docker config
  ansible.builtin.command: >-
    docker info --format
    '{% raw %}{{.Driver}} {{.CgroupDriver}} {{.SecurityOptions}}{% endraw %}'
  register: docker_info
  changed_when: false

- name: Assert docker runtime properties
  ansible.builtin.assert:
    that:
      - docker_storage_driver in docker_info.stdout
      - "'systemd' in docker_info.stdout"
      - "'seccomp' in docker_info.stdout"
    fail_msg: "docker info did not report expected config — check /etc/docker/daemon.json"
