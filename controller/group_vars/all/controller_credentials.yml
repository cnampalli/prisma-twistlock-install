---
# Credential INSTANCES. Secret values are intentionally omitted — populate them
# at apply time (-e @controller-secrets.vault.yml) or in the Controller UI after
# creation. Committing empty secret fields is safe.
#
# Only the built-in Machine credential is defined. The backup token + internal
# URL and the restore API user/password are NOT credentials — they are supplied
# via job-template surveys (survey_ops_backup.yml, survey_dr_drill.yml), because
# creating the custom credential types they'd otherwise need requires Controller
# superuser. To switch to the credential-based approach instead, see the
# optional Path A in controller_credential_types.yml.
controller_credentials:
  - name: "prisma-ssh"
    organization: "Security Platform"
    credential_type: "Machine"
    inputs:
      username: ansible
      # ssh_key_data: supplied at apply time (secret)
