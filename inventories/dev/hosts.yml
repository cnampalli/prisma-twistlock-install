---
# Dev inventory. Two sites: primary (live) + secondary (DR target).
# Hosts connect by DNS name (resolvable FQDN). IP addressing and the SSH
# transport are managed by the external Ansible/AAP platform team and are
# deliberately not pinned here.
#
# A host belongs to two orthogonal axes:
#   - role group: prisma_console / prisma_scanner / prisma_sandbox (under prisma_all)
#   - site group: primary / secondary  (see group_vars/{primary,secondary}.yml)
all:
  children:
    prisma_all:
      children:
        prisma_console:
        prisma_scanner:
        prisma_sandbox:
    primary:
      hosts:
        prisma-console-dev-primary:
        prisma-scanner-dev-primary:
        prisma-sandbox-dev-primary:
    secondary:
      hosts:
        prisma-console-dev-secondary:
        prisma-scanner-dev-secondary:
        prisma-sandbox-dev-secondary:
    prisma_console:
      hosts:
        prisma-console-dev-primary:
        prisma-console-dev-secondary:
    prisma_scanner:
      hosts:
        prisma-scanner-dev-primary:
        prisma-scanner-dev-secondary:
    prisma_sandbox:
      hosts:
        prisma-sandbox-dev-primary:
        prisma-sandbox-dev-secondary:
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
