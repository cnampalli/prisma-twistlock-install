---
- name: Create node_exporter user
  ansible.builtin.user:
    name: "{{ node_exporter_user }}"
    system: true
    shell: /sbin/nologin
    home: /var/lib/node_exporter
    create_home: false

- name: Assert node_exporter checksum supplied
  ansible.builtin.assert:
    that: node_exporter_sha256 | length == 64
    fail_msg: >-
      node_exporter_sha256 must be the 64-char SHA-256 hex digest of
      {{ node_exporter_tarball }}. Compute with: sha256sum {{ node_exporter_tarball }}

- name: Stage node_exporter tarball (air-gap)
  ansible.builtin.copy:
    src: "{{ node_exporter_tarball }}"
    dest: "/opt/{{ node_exporter_tarball }}"
    owner: root
    group: root
    mode: "0644"

- name: Compute SHA-256 of staged node_exporter tarball
  ansible.builtin.stat:
    path: "/opt/{{ node_exporter_tarball }}"
    checksum_algorithm: sha256
  register: node_exporter_staged

- name: Verify node_exporter tarball integrity
  ansible.builtin.assert:
    that: node_exporter_staged.stat.checksum == node_exporter_sha256
    fail_msg: >-
      node_exporter tarball integrity check FAILED.
      expected={{ node_exporter_sha256 }} got={{ node_exporter_staged.stat.checksum }}

- name: Extract node_exporter
  ansible.builtin.unarchive:
    src: "/opt/{{ node_exporter_tarball }}"
    dest: /opt/
    remote_src: true
    creates: "/opt/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"

- name: Install node_exporter binary
  ansible.builtin.copy:
    src: "/opt/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: "{{ node_exporter_bin }}"
    remote_src: true
    owner: root
    group: root
    mode: "0755"

- name: Open node_exporter port
  ansible.posix.firewalld:
    port: "{{ node_exporter_port }}/tcp"
    permanent: true
    immediate: true
    state: enabled

- name: Install node_exporter service
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Daemon reload
    - Restart node_exporter

- name: Enable and start node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    enabled: true
    state: started

- name: Configure rsyslog to ship Prisma Console logs
  ansible.builtin.template:
    src: 60-prisma-console.conf.j2
    dest: /etc/rsyslog.d/60-prisma-console.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart rsyslog
