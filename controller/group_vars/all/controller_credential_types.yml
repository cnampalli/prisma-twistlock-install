---
# OPTIONAL — Path A. Creating credential *types* requires a Controller System
# Administrator (superuser). The DEFAULT wiring in this repo does NOT use these:
# prisma-30-ops and prisma-40-dr-drill carry the same secrets via surveys
# (survey_ops_backup.yml, survey_dr_drill.yml), which need no superuser. So the
# top-level key below is deliberately named `controller_credential_types_optional`
# — the infra.controller_configuration dispatch role only acts on
# `controller_credential_types`, so as-named this block is NOT applied.
#
# To use Path A instead (you have superuser, or hand this spec to the platform
# team that runs AAP):
#   1. rename the key below to `controller_credential_types`,
#   2. restore the prisma-backup-prod / prisma-restore-api-prod credentials in
#      controller_credentials.yml,
#   3. re-add those credentials to the job templates and drop their
#      survey_enabled/survey_spec for the backup/restore secrets.
#
# The injector strings are wrapped with !unsafe so Ansible does NOT template
# them while loading — the literal "{{ field }}" must reach the Controller API,
# which resolves it at job launch (secret values are masked in job output).
controller_credential_types_optional:
  - name: "Prisma Backup"
    kind: cloud
    description: "Console backup service-account token + internal artefact store URL"
    inputs:
      fields:
        - id: prisma_backup_token
          type: string
          label: "Console backup service-account token"
          secret: true
        - id: internal_backup_url
          type: string
          label: "Internal artefact store base URL"
      required:
        - prisma_backup_token
        - internal_backup_url
    injectors:
      extra_vars:
        prisma_backup_token: !unsafe "{{ prisma_backup_token }}"
        internal_backup_url: !unsafe "{{ internal_backup_url }}"

  - name: "Prisma Restore API"
    kind: cloud
    description: "Console API user/password used by the DR restore role (twistcli)"
    inputs:
      fields:
        - id: prisma_restore_api_user
          type: string
          label: "Console API user (restore)"
        - id: prisma_restore_api_password
          type: string
          label: "Console API password (restore)"
          secret: true
      required:
        - prisma_restore_api_user
        - prisma_restore_api_password
    injectors:
      extra_vars:
        prisma_restore_api_user: !unsafe "{{ prisma_restore_api_user }}"
        prisma_restore_api_password: !unsafe "{{ prisma_restore_api_password }}"

  - name: "Prisma First-Run"
    kind: cloud
    description: >-
      Licence key + LDAPS bind password for the manual Phase 11 first-run
      wizard. Stored in AAP for safekeeping; NO playbook consumes these today.
    inputs:
      fields:
        - id: prisma_license_key
          type: string
          label: "Prisma Cloud Compute licence key"
          secret: true
        - id: prisma_ldaps_bind_password
          type: string
          label: "LDAPS bind password"
          secret: true
    injectors:
      extra_vars:
        prisma_license_key: !unsafe "{{ prisma_license_key }}"
        prisma_ldaps_bind_password: !unsafe "{{ prisma_ldaps_bind_password }}"

  - name: "Nexus"
    kind: cloud
    description: >-
      Basic-auth credentials for the internal Nexus repo. Consumed by every
      role that fetches from Nexus (prisma_stage, docker_stage, future) —
      each role's _nexus_username/_password defaults to nexus_username /
      nexus_password from this credential. ONE credential serves all roles.
      The DEFAULT no-superuser wiring uses survey_stage_nexus.yml on the
      prisma-site template (password field is masked) instead.
    inputs:
      fields:
        - id: nexus_username
          type: string
          label: "Nexus username"
        - id: nexus_password
          type: string
          label: "Nexus password"
          secret: true
      required:
        - nexus_username
        - nexus_password
    injectors:
      extra_vars:
        nexus_username: !unsafe "{{ nexus_username }}"
        nexus_password: !unsafe "{{ nexus_password }}"
