---
# The Console data volume lives at {{ prisma_data_folder }}. This role ensures
# that directory exists and applies the SELinux container label that rootful
# podman bind-mounts require. It does NOT create or require a dedicated mount —
# whether {{ prisma_data_folder }} is its own filesystem is the platform/DC
# team's choice; the role works either way.

# GUARD: refuse to run if prisma_data_folder is missing, relative, a system
# directory, or too shallow. Without this, a misconfigured value (e.g. "/var")
# makes the semanage + restorecon below stamp container_file_t across the system
# and break every SELinux-confined service (SSSD, etc.). Fail fast instead.
- name: Validate prisma_data_folder is a safe, dedicated path
  ansible.builtin.assert:
    that:
      - (prisma_data_folder | default('')) is string
      - (prisma_data_folder | default('')) | length > 0
      - (prisma_data_folder | default('')).startswith('/')
      - (prisma_data_folder | default('')) not in prisma_storage_unsafe_paths
      - ((prisma_data_folder | default('')) | regex_replace('/+$', '')).split('/') | length >= 3
    fail_msg: >-
      Refusing to run: prisma_data_folder='{{ prisma_data_folder | default('<undefined>') }}'
      must be an absolute, dedicated path at least two levels deep
      (e.g. /var/lib/twistlock) and must not be a system directory. Applying
      container_file_t + restorecon to a broad path mislabels the system and
      breaks SELinux-confined services.
    success_msg: "prisma_data_folder '{{ prisma_data_folder }}' is a safe, dedicated path."

- name: Ensure the data folder exists
  ansible.builtin.file:
    path: "{{ prisma_data_folder }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

# SELinux labelling uses the semanage CLI directly rather than
# community.general.sefcontext: the target air-gapped EE does not ship the
# community.general collection and operators cannot add it. semanage is provided
# by policycoreutils-python-utils, installed by rhel_baseline. `-a` errors if the
# rule already exists, so we tolerate "already defined" for idempotency.
- name: Ensure SELinux fcontext for the data folder (semanage; no collection needed)
  ansible.builtin.command:
    cmd: "semanage fcontext -a -t container_file_t '{{ prisma_data_folder }}(/.*)?'"
  register: prisma_sefcontext
  changed_when: prisma_sefcontext.rc == 0
  failed_when:
    - prisma_sefcontext.rc != 0
    - "'already defined' not in (prisma_sefcontext.stderr | default(''))"

- name: Apply SELinux labels
  ansible.builtin.command: "restorecon -R {{ prisma_data_folder }}"
  changed_when: false
