---
# Minimum package set applied to every Prisma host class (console, scanner,
# sandbox). policycoreutils-python-utils is required by ansible.posix.selinux;
# rsyslog + audit satisfy the Prisma hardening guide; curl is used by the
# backup script. lvm2 + xfsprogs stay in the core list because all three
# host classes provision a 200GB data volume (scanner + sandbox use the disk
# for image pull caches; console uses it for /var/lib/twistlock).
rhel_baseline_packages:
  - lvm2
  - xfsprogs
  - chrony
  - firewalld
  - policycoreutils-python-utils
  - openssl
  - jq
  - tar
  - gzip
  - logrotate
  - rsyslog
  - audit
  - curl

# Container-runtime package(s) — host-class specific. Console gets podman;
# scanner and sandbox get [] here (docker-ce is installed by docker_stage).
# Override in group_vars/prisma_console.yml.
rhel_baseline_container_packages: []

# Ports opened on firewalld. Empty by default — only the Console has
# inbound ports (8083 UI/API, 8084 Defender comms), set in
# group_vars/prisma_console.yml. Scanner + sandbox have no inbound
# services beyond SSH (covered by rhel_baseline_firewall_services).
rhel_baseline_firewall_ports: []

# Firewalld services allowed into the host (distinct from port list).
rhel_baseline_firewall_services:
  - ssh

# Kernel tunables required by Prisma Console under load. vm.max_map_count is
# the container-workload default recommended by Palo Alto. file-max and
# net.core.somaxconn size the socket tables for concurrent Defender traffic.
rhel_baseline_sysctl:
  vm.swappiness: "10"
  vm.max_map_count: "262144"
  fs.file-max: "2097152"
  net.core.somaxconn: "1024"
  net.ipv4.tcp_max_syn_backlog: "1024"

# journald caps — large enough to retain ~7 days of Console logs between
# rsyslog ships. Keep-free reserves headroom so journald does not fill /var.
rhel_baseline_journald_max_use: "2G"
rhel_baseline_journald_keep_free: "1G"
