---
# Non-secret defaults. Override per-host in host_vars/.
# Secrets (bind password, backup token, etc.) MUST come from Vault/Ansible-Vault.

# Prisma Console install
prisma_version: "34_01_126"
prisma_tarball_name: "prisma_cloud_compute_edition_{{ prisma_version }}.tar.gz"
prisma_install_dir: "/opt/prisma-install"
prisma_extracted_dir: "{{ prisma_install_dir }}/prisma_cloud_compute_edition_{{ prisma_version }}"
prisma_data_folder: "/var/lib/twistlock"

# Network ports
prisma_https_port: 8083
prisma_comm_port: 8084

# FIPS
prisma_fips_enabled: true

# TLS (expected on control node under files/)
prisma_custom_cert: true
prisma_cert_src: "console.crt"
prisma_key_src: "console.key"
prisma_ca_chain_src: "ca-chain.crt"
prisma_pki_dir: "/etc/pki/prisma"
prisma_cert_path: "{{ prisma_pki_dir }}/console.crt"
prisma_cert_key_path: "{{ prisma_pki_dir }}/console.key"
prisma_cert_ca_path: "{{ prisma_pki_dir }}/ca-chain.crt"

# Storage — data disk device (confirm per host)
prisma_data_device: "/dev/sdb"
prisma_vg_name: "vg_twistlock"
prisma_lv_name: "lv_data"
prisma_fs_label: "twistlock"

# NTP sources (internal)
ntp_servers:
  - ntp1.internal
  - ntp2.internal

# Firewall sources
firewall_allow_operator_cidr: "10.0.0.0/8"
firewall_allow_defender_cidr: "10.0.0.0/8"

# Backup
prisma_backup_dir: "/var/backups/prisma"
prisma_backup_retention_days: 30
prisma_backup_user: "prisma-backup"                    # service account in Prisma
# Set these via Vault — do NOT commit real values:
# prisma_backup_token: !vault ...
# internal_backup_url: "https://artefacts.internal/prisma/"

# Monitoring
node_exporter_version: "1.8.2"
node_exporter_port: 9100
siem_server: "siem.internal"
siem_port: 514
