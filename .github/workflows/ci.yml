---
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: yamllint + ansible-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ansible-core>=2.16" "ansible-lint>=24" "yamllint>=1.35"
          ansible-galaxy collection install -r requirements.yml

      - name: yamllint
        run: yamllint .

      - name: ansible-lint
        run: ansible-lint

      - name: ansible syntax-check
        run: ansible-playbook --syntax-check playbooks/site.yml

  molecule:
    name: molecule default
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install molecule + deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ansible-core>=2.16" "molecule>=6" "molecule-plugins[docker]>=23" "docker>=7"
          ansible-galaxy collection install -r requirements.yml

      - name: molecule test
        run: molecule test -s default
        env:
          ANSIBLE_FORCE_COLOR: "1"
          PY_COLORS: "1"
